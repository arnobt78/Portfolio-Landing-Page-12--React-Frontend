<!doctype html>
<!-- Single-page portfolio: React mounts into #root; meta and styles apply before JS loads (e.g. gradient background avoids white flash on refresh). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Doe's Portfolio</title>
    <meta name="description" content="John Doe's portfolio — creative digital experiences with React, Vite, and Three.js. Think. Make. Solve. Live demo of the Portfolio Landing Page project." />
    <meta name="author" content="Arnob Mahmud (https://www.arnobmahmud.com, contact@arnobmahmud.com)" />
    <meta name="keywords" content="portfolio, John Doe, React, Vite, Three.js, frontend, web development, creative portfolio, Arnob Mahmud, portfolio-ui-12" />
    <meta name="theme-color" content="#3d1c56" />
    <link rel="canonical" href="https://portfolio-ui-12.vercel.app/" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-ui-12.vercel.app/" />
    <meta property="og:title" content="John Doe's Portfolio" />
    <meta property="og:description" content="John Doe's portfolio — creative digital experiences with React, Vite, and Three.js. Think. Make. Solve." />
    <meta property="og:image" content="https://portfolio-ui-12.vercel.app/vite.svg" />
    <meta property="og:locale" content="en_US" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="John Doe's Portfolio" />
    <meta name="twitter:description" content="John Doe's portfolio — creative digital experiences with React, Vite, and Three.js. Think. Make. Solve." />
    <meta name="twitter:image" content="https://portfolio-ui-12.vercel.app/vite.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        font-family: "Roboto", sans-serif;
      }
      html, body {
        background: linear-gradient(to right, #3d1c56 0%, #1a0a2e 50%, #0f0a1a 100%);
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
